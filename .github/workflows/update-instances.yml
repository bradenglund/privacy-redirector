name: Update Instances from LibRedirect

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Update instances from libredirect data.json
        run: node tools/update-instances.js

      - name: Update version to current date
        run: |
          sed -i "s/\/\/ @version .*/\/\/ @version $(date +'%Y.%m.%d')/" privacy-redirector.user.js

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet privacy-redirector.user.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add privacy-redirector.user.js
          git commit -m "chore: update instances and version to $(date +'%Y.%m.%d')"
          git push
